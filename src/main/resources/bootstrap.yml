app:
  port: ${APP_PORT:8080}
  logging: debug
  server: ${APP_SERVER:server}
  database: ${APP_DATABASE:database}
  username: ${APP_USERNAME:username}
  password: ${APP_PASSWORD:password}
  testing: ${APP_TESTING:false}
  consul:
    host: consul-service
    port: 8500

server:
  port: ${app.port}

spring:
  application:
    name: tesoreria-guarani-service
  datasource:
    url: jdbc:postgresql://${app.server}/${app.database}
    username: ${app.username}
    password: ${app.password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 200000
    consul:
      host: ${app.consul.host}
      port: ${app.consul.port}
      discovery:
        prefer-ip-address: true
        tags: tesoreria,guarani

logging:
  level:
    um.tesoreria.guarani: ${app.logging}
    web: ${app.logging}
    org:
      springframework:
        web: ${app.logging}
        cloud: ${app.logging}
        security: ${app.logging}
    feign: ${app.logging}
    feign.hystrix: ${app.logging}
